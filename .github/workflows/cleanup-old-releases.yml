name: Cleanup old releases

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-old-releases.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove obsolete releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          current="v2026.07.13.01"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '.[].tagName' |
          while read -r tag; do
            if [ -n "$tag" ] && [ "$tag" != "$current" ]; then
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            fi
          done
