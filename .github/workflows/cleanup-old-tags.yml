name: Cleanup old tags

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-old-tags.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove obsolete tags
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          current="refs/tags/v2026.07.13.01"
          gh api --paginate "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/" --jq '.[].ref' |
          while read -r ref; do
            if [ -n "$ref" ] && [ "$ref" != "$current" ]; then
              tag="${ref#refs/tags/}"
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag"
            fi
          done
