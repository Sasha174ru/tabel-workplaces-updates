name: Finalize 2026.07.13.02

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/finalize-2026071302.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove staging files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch \
            staging/2026071302 \
            staging/2026071302b \
            .github/workflows/publish-2026071302.yml \
            .github/workflows/finalize-2026071302.yml
          git commit -m "chore: finalize 2026.07.13.02 release"
          git push

      - name: Remove previous release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "v2026.07.13.01" \
            --repo "$GITHUB_REPOSITORY" \
            --yes \
            --cleanup-tag
