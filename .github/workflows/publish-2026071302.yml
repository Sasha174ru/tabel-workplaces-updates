name: Publish 2026.07.13.02

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-2026071302.yml
      - staging/2026071302b/**

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble and verify APK
        shell: bash
        run: |
          set -euo pipefail
          apk="$RUNNER_TEMP/default-2026071302-sync-revision.apk"
          cat staging/2026071302b/part-*.bin > "$apk"
          echo "F254B64B552DD954D6339B1C623E58291C6C07024550734B3847FFC283D19318  $apk" | sha256sum -c -
          test "$(stat -c%s "$apk")" = "2478397"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v2026.07.13.02"
          asset="default-2026071302-sync-revision.apk"
          apk="$RUNNER_TEMP/$asset"
          gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$tag" "$apk#$asset" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Табель рабочих мест 2026.07.13.02" \
            --notes "Улучшена синхронизация между устройствами: добавлена защита серверной ревизии, повторное объединение при конфликте и подтверждённый статус сохранения. Добавлены тесты приёма, увольнения и повторного приёма. Android versionCode: 2026071302." \
            --latest

      - name: Update stable download metadata
        shell: bash
        run: |
          set -euo pipefail
          asset="default-2026071302-sync-revision.apk"
          cp "$RUNNER_TEMP/$asset" default.apk
          cat > latest.json <<'JSON'
          {
            "version": "2026.07.13.02",
            "name": "default-2026071302-sync-revision.apk",
            "apkUrl": "https://github.com/Sasha174ru/tabel-workplaces-updates/releases/download/v2026.07.13.02/default-2026071302-sync-revision.apk",
            "sha256": "F254B64B552DD954D6339B1C623E58291C6C07024550734B3847FFC283D19318",
            "notes": "Надёжная синхронизация между устройствами, защита ревизий и проверенный кадровый цикл."
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add default.apk latest.json
          git commit -m "release: publish 2026.07.13.02"
          git push
