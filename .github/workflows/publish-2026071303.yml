name: Publish stable release 2026.07.13.03

on:
  push:
    branches: [main]
    paths:
      - ".release-staging/**"
      - ".github/workflows/publish-2026071303.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: \${{ github.token }}
      TAG: v2026.07.13.03
      OLD_TAG: v2026.07.13.02
      ASSET: default-2026071303-full-names.apk
      APK_SHA256: A77E9EFDEEDD17E126DBDBCE01ED7DDF673FC987FD2E8B6E359995649941C2EB
      APK_SIZE: "2478783"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble and verify APK
        shell: bash
        run: |
          cat .release-staging/part-* > candidate.apk
          test "$(stat -c%s candidate.apk)" = "$APK_SIZE"
          echo "$APK_SHA256  candidate.apk" | sha256sum -c -

      - name: Create and verify release
        shell: bash
        run: |
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --cleanup-tag -y || true
          gh release create "$TAG" "candidate.apk#$ASSET" \
            --target "$GITHUB_SHA" \
            --title "Табель рабочих мест 2026.07.13.03" \
            --notes "Полные ФИО в бланках: фамилия, имя и отчество отображаются без обрезания и многоточия."
          mkdir -p release-check
          gh release download "$TAG" --pattern "$ASSET" --dir release-check
          echo "$APK_SHA256  release-check/$ASSET" | sha256sum -c -

      - name: Promote update metadata and clean staging
        shell: bash
        run: |
          cp candidate.apk default.apk
          cat > latest.json <<EOF
          {
            "version": "2026.07.13.03",
            "name": "$ASSET",
            "apkUrl": "https://github.com/Sasha174ru/tabel-workplaces-updates/releases/download/$TAG/$ASSET",
            "sha256": "$APK_SHA256",
            "notes": "Полные ФИО в бланках без обрезания: отчество теперь отображается полностью."
          }
          EOF
          cat > README.md <<EOF
          # Табель рабочих мест - обновления

          Базовая релизная сборка: \`2026.07.13.03\`.

          Актуальный APK:
          https://github.com/Sasha174ru/tabel-workplaces-updates/releases/download/$TAG/$ASSET

          Постоянная ссылка APK:
          https://github.com/Sasha174ru/tabel-workplaces-updates/raw/main/default.apk

          Служебный файл автообновления: \`latest.json\`.

          Инструкция для будущих правок в Codex: \`CODEX_INSTRUCTIONS.md\`.
          EOF
          rm -rf .release-staging .github/workflows/publish-2026071303.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: promote 2026.07.13.03"
          git push

      - name: Remove previous stable release
        shell: bash
        run: |
          gh release delete "$OLD_TAG" --cleanup-tag -y || true
